version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  disable:
    - depguard
    - exhaustruct
    - forcetypeassert
    - funlen
    - gocognit
    - gocyclo
    - gochecknoglobals
    - gochecknoinits
    - goconst
    - gocritic
    - godot
    - godox
    - gosmopolitan
    - inamedparam
    - interfacebloat
    - ireturn
    - lll
    - maintidx
    - mirror
    - mnd
    - musttag
    - nestif
    - nilerr
    - nilnil
    - noctx
    - noinlineerr
    - nlreturn
    - nonamedreturns
    - revive
    - tagliatelle
    - unparam
    - usestdlibvars
    - wrapcheck
    - wsl_v5
    - wsl

  exclusions:
    rules:
      - path: internal/writer/
        linters:
          - errcheck
      - path: internal/cli/
        linters:
          - errcheck
      - path: internal/tui/
        linters:
          - errcheck
      - path: internal/collector/
        linters:
          - errcheck

  settings:
    staticcheck:
      checks:
        - all
        - -ST1005

run:
  timeout: 5m
