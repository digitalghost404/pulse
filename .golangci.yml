version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  disable:
    - depguard
    - exhaustruct
    - forcetypeassert
    - funlen
    - gocognit
    - gocyclo
    - gochecknoglobals
    - gochecknoinits
    - goconst
    - gocritic
    - godot
    - godox
    - gosmopolitan
    - inamedparam
    - interfacebloat
    - ireturn
    - lll
    - maintidx
    - mirror
    - mnd
    - musttag
    - nestif
    - nilerr
    - nilnil
    - noctx
    - noinlineerr
    - nlreturn
    - nonamedreturns
    - revive
    - tagliatelle
    - unparam
    - usestdlibvars
    - wrapcheck
    - wsl_v5
    - wsl

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - fmt.Printf
        - fmt.Println
        - fmt.Print
    staticcheck:
      checks:
        - all
        - -ST1005

run:
  timeout: 5m
