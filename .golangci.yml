linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  disable-all: true
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - fmt.Printf
        - fmt.Println
        - fmt.Print
    staticcheck:
      checks:
        - all
        - -ST1005

run:
  timeout: 5m
